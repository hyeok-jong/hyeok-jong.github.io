<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Clock with Date</title>
    <style>
        .clock {
            position: relative;
            width: 300px;
            height: 300px;
            border: 16px solid #8E44AD; /* Dark purple border */
            border-radius: 50%;
            margin: 50px auto;
            background: radial-gradient(circle, #f1f1f1 40%, #e2e2e2);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background-color: #333;
        }

        .hour {
            width: 8px;
            height: 60px;
            border-radius: 6px;
        }

        .minute {
            width: 6px;
            height: 80px;
            border-radius: 4px;
        }

        .second {
            width: 2px;
            height: 100px;
            background-color: #e74c3c; /* Red color for seconds hand */
        }

        .date {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: 20px;
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="hand hour" id="hour-hand"></div>
        <div class="hand minute" id="minute-hand"></div>
        <div class="hand second" id="second-hand"></div>
        <div class="date" id="current-date"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hoursDegree = ((hours / 12) * 360) + ((minutes / 60) * 30) + 90;
            const minutesDegree = ((minutes / 60) * 360) + ((seconds / 60) * 6) + 90;
            const secondsDegree = ((seconds / 60) * 360) + 90;

            document.getElementById('hour-hand').style.transform = `rotate(${hoursDegree}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${minutesDegree}deg)`;
            document.getElementById('second-hand').style.transform = `rotate(${secondsDegree}deg)`;

            // Update date
            const date = now.toISOString().split('T')[0];
            document.getElementById('current-date').textContent = date;
        }

        setInterval(updateClock, 1000);
        updateClock(); // Initialize the clock
    </script>
</body>
</html>

<script>
    let menu = document.getElementById('menu')
    if (menu) {
        menu.scrollLeft = localStorage.getItem("menu-scroll-position");
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        if (document.body.className.includes("dark")) {
            document.body.classList.remove('dark');
            localStorage.setItem("pref-theme", 'light');
        } else {
            document.body.classList.add('dark');
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
